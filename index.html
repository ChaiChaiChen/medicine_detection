<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
AI藥品顆數辨識
</title>


<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js">
</script>



<style>


body{

    margin:0;

    background:#000;

    color:white;

    font-family:sans-serif;

    text-align:center;

}



h2{

    margin:10px;

}



#cameraBox{

    position:relative;

    width:100vw;

    height:75vh;

}



video{

    position:absolute;

    width:100%;

    height:100%;

    object-fit:cover;

    left:0;

    top:0;

}



canvas{

    position:absolute;

    width:100%;

    height:100%;

    left:0;

    top:0;

}



#count{

    font-size:25px;

    margin:10px;

}



button{

    padding:15px 25px;

    margin:10px;

    font-size:18px;

}



</style>

</head>



<body>


<h2>
AI藥品辨識
</h2>



<div id="cameraBox">


<video
id="video"
autoplay
playsinline>
</video>


<canvas
id="canvas">
</canvas>


</div>



<div id="count">

藥品數量: 0 顆

</div>



<button onclick="startCamera()">

開啟相機

</button>



<button onclick="stopCamera()">

關閉相機

</button>




<script>



ort.env.wasm.wasmPaths =
"https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";



let session=null;

let stream=null;

let running=false;



const video =
document.getElementById(
"video"
);



const canvas =
document.getElementById(
"canvas"
);



const ctx =
canvas.getContext(
"2d"
);




// ======================
// 載入ONNX
// ======================


async function loadModel(){


    try{


        session =
        await ort.InferenceSession.create(
            "model.onnx",
            {

                executionProviders:[
                    "wasm"
                ]

            }
        );


        console.log(
        "模型載入完成"
        );


    }

    catch(e){


        alert(
        "模型載入失敗\n"
        +
        e.message
        );


    }

}






// ======================
// 開啟相機
// ======================


async function startCamera(){


    if(!session)
    {
        await loadModel();
    }



    stream =
    await navigator.mediaDevices
    .getUserMedia({

        video:{

            facingMode:
            {
                ideal:
                "environment"
            }

        },

        audio:false

    });



    video.srcObject =
    stream;



    running=true;


    detectLoop();


}






// ======================
// 關閉相機
// ======================


function stopCamera(){


    running=false;


    if(stream){


        stream
        .getTracks()
        .forEach(
            t=>t.stop()
        );


    }


}







// ======================
// AI LOOP
// ======================


async function detectLoop(){


    if(!running)
        return;



    if(video.readyState===4){


        let tensor =
        preprocess();



        let inputName =
        session.inputNames[0];


        let result =
        await session.run({

            [inputName]:
            tensor

        });



        drawBoxes(result);



    }



    requestAnimationFrame(
        detectLoop
    );


}







// ======================
// 圖像轉Tensor
// ======================


function preprocess(){



    const size=640;



    let temp =
    document.createElement(
        "canvas"
    );


    temp.width=size;

    temp.height=size;



    let tctx =
    temp.getContext(
        "2d"
    );



    tctx.drawImage(

        video,

        0,

        0,

        size,

        size

    );



    let img =
    tctx.getImageData(

        0,

        0,

        size,

        size

    );



    let data =
    img.data;



    let input =
    new Float32Array(

        size*
        size*
        3

    );



    for(
        let i=0;
        i<size*size;
        i++
    ){


        input[i]
        =
        data[i*4]/255;



        input[i+size*size]
        =
        data[i*4+1]/255;



        input[i+size*size*2]
        =
        data[i*4+2]/255;



    }



    return new ort.Tensor(

        "float32",

        input,

        [

        1,

        3,

        size,

        size

        ]

    );


}







// ======================
// 畫框與計數
// ======================


function drawBoxes(output){



    canvas.width =
    video.videoWidth;



    canvas.height =
    video.videoHeight;



    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );



    let key =
    Object.keys(output)[0];



    let data =
    output[key].data;



    let count=0;



    for(

        let i=0;

        i<data.length;

        i+=6

    ){



        let x =
        data[i];

        let y =
        data[i+1];

        let w =
        data[i+2];

        let h =
        data[i+3];

        let score =
        data[i+4];



        if(score < 0.5)
            continue;



        count++;



        drawBox(

            x*canvas.width,

            y*canvas.height,

            w*canvas.width,

            h*canvas.height,

            score

        );



    }



    document.getElementById(
    "count"
    ).innerHTML =

    "藥品數量: "
    +
    count
    +
    " 顆";

}






// ======================
// 畫單顆藥框
// ======================


function drawBox(

x,

y,

w,

h,

score

){



    ctx.strokeStyle =
    "red";


    ctx.lineWidth=3;



    ctx.strokeRect(

        x-w/2,

        y-h/2,

        w,

        h

    );



    ctx.fillStyle =
    "red";


    ctx.font =
    "20px Arial";



    ctx.fillText(

        "藥 "
        +
        Math.round(score*100)
        +
        "%",

        x-w/2,

        y-h/2-5

    );


}



</script>


</body>

</html>
