<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI藥品計數</title>


<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>


<style>


body{

    margin:0;
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;

}



#cameraBox{

    position:relative;
    width:100vw;
    height:75vh;
    overflow:hidden;

}



video{

    position:absolute;

    width:100%;
    height:100%;

    object-fit:cover;

    left:0;
    top:0;

}



canvas{

    position:absolute;

    left:0;
    top:0;

    width:100%;
    height:100%;

}



#count{

    font-size:26px;

    margin:15px;

}



button{

    font-size:18px;

    padding:12px 25px;

    margin:10px;

}



</style>


</head>



<body>


<h2>
AI藥品顆數辨識
</h2>



<div id="cameraBox">


<video
id="video"
autoplay
playsinline>
</video>


<canvas id="canvas"></canvas>


</div>



<div id="count">

藥品數量: 0 顆

</div>



<button onclick="startCamera()">

開啟相機

</button>



<button onclick="stopCamera()">

關閉相機

</button>





<script>


ort.env.wasm.wasmPaths =
"https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";



let session=null;

let stream=null;

let running=false;



const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");





// ======================
// 載入模型
// ======================


async function loadModel(){


    session =
    await ort.InferenceSession.create(

        "model.onnx",

        {

            executionProviders:[
                "wasm"
            ]

        }

    );


    console.log("模型載入成功");


}






// ======================
// 開啟相機
// ======================


async function startCamera(){



    if(!session){

        await loadModel();

    }



    stream =
    await navigator.mediaDevices
    .getUserMedia({

        video:{

            facingMode:
            {
                ideal:
                "environment"
            }

        },

        audio:false

    });



    video.srcObject=stream;



    video.onloadedmetadata=()=>{


        canvas.width =
        video.videoWidth;


        canvas.height =
        video.videoHeight;



        running=true;


        detectLoop();


    };


}







// ======================
// 關閉相機
// ======================


function stopCamera(){


    running=false;



    if(stream){


        stream
        .getTracks()
        .forEach(
            t=>t.stop()
        );


    }


}








// ======================
// AI循環
// ======================


async function detectLoop(){


    if(!running)
        return;



    let tensor =
    preprocess();



    let inputName =
    session.inputNames[0];



    let result =
    await session.run({

        [inputName]:
        tensor

    });



    drawResult(
        result.output0
    );



    requestAnimationFrame(
        detectLoop
    );


}








// ======================
// 圖像前處理
// ======================


function preprocess(){



    const size=640;



    let c =
    document.createElement("canvas");


    c.width=size;

    c.height=size;



    let cctx =
    c.getContext("2d");



    cctx.drawImage(

        video,

        0,

        0,

        size,

        size

    );



    let img =
    cctx.getImageData(

        0,

        0,

        size,

        size

    );



    let data =
    img.data;



    let input =
    new Float32Array(

        size*
        size*
        3

    );



    for(

        let i=0;

        i<size*size;

        i++

    ){


        input[i]
        =
        data[i*4]/255;



        input[i+size*size]
        =
        data[i*4+1]/255;



        input[i+size*size*2]
        =
        data[i*4+2]/255;



    }



    return new ort.Tensor(

        "float32",

        input,

        [

            1,

            3,

            size,

            size

        ]

    );


}









// ======================
// YOLO解析
// ======================


function drawResult(output){



    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );



    let data =
    output.data;



    const total=8400;



    let boxes=[];



    for(

        let i=0;

        i<total;

        i++

    ){



        let score =
        data[i+total*4];



        if(score < 0.65)

            continue;




        boxes.push({

            x:data[i],

            y:data[i+total],

            w:data[i+total*2],

            h:data[i+total*3],

            score:score

        });


    }





    boxes =
    nms(

        boxes,

        0.35

    );





    boxes.forEach(

        (b,index)=>{


            let sx =
            canvas.width/640;


            let sy =
            canvas.height/640;



            let x =
            b.x*sx;


            let y =
            b.y*sy;


            let w =
            b.w*sx;


            let h =
            b.h*sy;



            ctx.strokeStyle="red";

            ctx.lineWidth=3;



            ctx.strokeRect(

                x-w/2,

                y-h/2,

                w,

                h

            );



            ctx.fillStyle="yellow";

            ctx.font="20px Arial";



            ctx.fillText(

                "藥"+

                (index+1)+

                " "+

                Math.round(
                    b.score*100
                )+

                "%",

                x-w/2,

                y-h/2-5

            );


        }

    );




    document.getElementById("count")
    .innerHTML =

    "藥品數量: "

    +

    boxes.length

    +

    " 顆";



}









// ======================
// NMS
// ======================


function nms(boxes,threshold){



    boxes.sort(

        (a,b)=>

        b.score-a.score

    );



    let result=[];



    while(boxes.length){



        let best =
        boxes.shift();



        result.push(best);



        boxes =
        boxes.filter(

            b=>

            iou(
                best,
                b
            )

            <

            threshold

        );


    }



    return result;


}







// ======================
// IoU
// ======================


function iou(a,b){



    let ax1 =
    a.x-a.w/2;


    let ay1 =
    a.y-a.h/2;


    let ax2 =
    a.x+a.w/2;


    let ay2 =
    a.y+a.h/2;



    let bx1 =
    b.x-b.w/2;


    let by1 =
    b.y-b.h/2;


    let bx2 =
    b.x+b.w/2;


    let by2 =
    b.y+b.h/2;



    let ix =
    Math.max(
        0,
        Math.min(ax2,bx2)
        -
        Math.max(ax1,bx1)
    );



    let iy =
    Math.max(
        0,
        Math.min(ay2,by2)
        -
        Math.max(ay1,by1)
    );



    let inter =
    ix*iy;



    let union =

    a.w*a.h

    +

    b.w*b.h

    -

    inter;



    return inter/union;


}



</script>


</body>

</html>
