<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iPhone ONNX Camera AI</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>


<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
    text-align:center;
}


video{
    width:100vw;
    height:70vh;
    object-fit:cover;
}


canvas{
    display:none;
}


#result{
    font-size:22px;
    margin:15px;
}


button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
}

</style>

</head>


<body>


<h2>iPhone ONNX AI Camera</h2>


<video id="video" autoplay playsinline></video>


<canvas id="canvas"></canvas>


<div id="result">
等待模型...
</div>


<button onclick="startCamera()">開啟相機</button>

<button onclick="stopCamera()">關閉相機</button>



<script>


let stream;
let session;

let running=false;



const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");



//
// 載入 ONNX 模型
//
async function loadModel(){

    try{

        session = await ort.InferenceSession.create(
            "model.onnx",
            {
                executionProviders:[
                    "wasm"
                ]
            }
        );


        document.getElementById("result").innerHTML=
        "模型載入完成";


    }
    catch(e){

        alert(
        "模型載入失敗:"+e.message
        );

    }

}



//
// 開啟相機
//
async function startCamera(){


    if(!session)
        await loadModel();



    try{


        stream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:"environment"
            },

            audio:false

        });



        video.srcObject=stream;


        running=true;


        detectLoop();



    }
    catch(err){

        alert(
        "相機錯誤:"+err.message
        );

    }


}




//
// 關閉相機
//
function stopCamera(){


    running=false;


    if(stream){

        stream
        .getTracks()
        .forEach(
            t=>t.stop()
        );

    }


}




//
// AI辨識循環
//
async function detectLoop(){


    if(!running)
        return;



    if(video.readyState===4){


        let input =
        preprocess();



        try{


            let feeds={};


            let inputName =
            session.inputNames[0];


            feeds[inputName]=input;



            let output =
            await session.run(feeds);



            postprocess(output);



        }
        catch(e){

            console.log(e);

        }


    }



    requestAnimationFrame(
        detectLoop
    );

}





//
// 圖像前處理
//
function preprocess(){


    const size=640;


    canvas.width=size;
    canvas.height=size;


    ctx.drawImage(
        video,
        0,
        0,
        size,
        size
    );


    let img =
    ctx.getImageData(
        0,
        0,
        size,
        size
    );


    let data =
    img.data;



    let input =
    new Float32Array(
        size*size*3
    );



    for(let i=0;i<size*size;i++){


        input[i]
        =
        data[i*4]/255.0;


        input[i+size*size]
        =
        data[i*4+1]/255.0;


        input[i+size*size*2]
        =
        data[i*4+2]/255.0;


    }



    return new ort.Tensor(
        "float32",
        input,
        [
            1,
            3,
            size,
            size
        ]
    );


}




//
// 後處理
//
function postprocess(output){


    let key =
    Object.keys(output)[0];


    let result =
    output[key];



    document.getElementById("result")
    .innerHTML=
    "AI輸出:"+result.data.slice(0,10);



}




</script>


</body>

</html>
