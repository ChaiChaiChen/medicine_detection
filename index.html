<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI藥品計數</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>


<style>

body{
    margin:0;
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}


#cameraBox{

    position:relative;
    width:100vw;
    height:75vh;
    overflow:hidden;

}


video{

    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;

}


canvas{

    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;

}


#count{

    font-size:26px;
    margin:15px;

}


button{

    padding:12px 25px;
    margin:10px;
    font-size:18px;

}


</style>

</head>


<body>


<h2>
AI藥品顆數辨識
</h2>


<div id="cameraBox">

<video
id="video"
autoplay
playsinline>
</video>


<canvas id="canvas"></canvas>


</div>



<div id="count">
藥品數量:0 顆
</div>



<button onclick="startCamera()">
開啟相機
</button>


<button onclick="stopCamera()">
關閉相機
</button>





<script>


ort.env.wasm.wasmPaths =
"https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";



let session=null;
let stream=null;
let running=false;


const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");



let stableCount=0;





async function loadModel(){


    session =
    await ort.InferenceSession.create(

        "model.onnx",

        {
            executionProviders:[
                "wasm"
            ]
        }

    );


}





async function startCamera(){


    if(!session)
        await loadModel();



    stream =
    await navigator.mediaDevices
    .getUserMedia({

        video:{
            facingMode:
            "environment"
        },

        audio:false

    });



    video.srcObject=stream;



    video.onloadedmetadata=()=>{


        canvas.width =
        video.videoWidth;


        canvas.height =
        video.videoHeight;


        running=true;


        detectLoop();


    };


}







function stopCamera(){


    running=false;


    if(stream){

        stream
        .getTracks()
        .forEach(
            t=>t.stop()
        );

    }


}







// =========================
// YOLO letterbox 前處理
// =========================


function preprocess(){


    const size=640;


    let c =
    document.createElement("canvas");


    c.width=size;
    c.height=size;


    let cctx =
    c.getContext("2d");



    cctx.fillStyle="black";

    cctx.fillRect(
        0,
        0,
        size,
        size
    );



    let scale =
    Math.min(

        size/video.videoWidth,

        size/video.videoHeight

    );



    let nw =
    video.videoWidth*scale;


    let nh =
    video.videoHeight*scale;



    let dx =
    (size-nw)/2;


    let dy =
    (size-nh)/2;



    cctx.drawImage(

        video,

        dx,

        dy,

        nw,

        nh

    );




    let img =
    cctx.getImageData(

        0,
        0,
        size,
        size

    );



    let input =
    new Float32Array(

        size*size*3

    );



    for(

        let i=0;

        i<size*size;

        i++

    ){

        input[i]
        =
        img.data[i*4]/255;


        input[i+size*size]
        =
        img.data[i*4+1]/255;


        input[i+size*size*2]
        =
        img.data[i*4+2]/255;


    }



    return new ort.Tensor(

        "float32",

        input,

        [
            1,
            3,
            size,
            size
        ]

    );

}







async function detectLoop(){


    if(!running)
        return;



    let output =
    await session.run({

        [session.inputNames[0]]:
        preprocess()

    });



    drawPoints(
        output.output0
    );



    requestAnimationFrame(
        detectLoop
    );


}







// =========================
// 只畫中心點
// =========================


function drawPoints(output){


    ctx.clearRect(

        0,
        0,
        canvas.width,
        canvas.height

    );



    let data =
    output.data;


    let total=8400;


    let points=[];



    for(

        let i=0;

        i<total;

        i++

    ){


        let score =
        data[i+total*4];



        if(score<0.65)
            continue;



        points.push({

            x:data[i],

            y:data[i+total],

            w:data[i+total*2],

            h:data[i+total*3],

            score:score

        });


    }



    points =
    nms(points,0.35);




    points.forEach(p=>{


        let x =
        p.x/640*canvas.width;


        let y =
        p.y/640*canvas.height;



        ctx.beginPath();


        ctx.arc(

            x,

            y,

            7,

            0,

            Math.PI*2

        );



        ctx.fillStyle="red";


        ctx.fill();


    });





    stableCount =
    Math.round(

        stableCount*0.8

        +

        points.length*0.2

    );



    document.getElementById("count")
    .innerHTML=

    "藥品數量:"
    +
    stableCount
    +
    " 顆";


}







function nms(boxes,threshold){


    boxes.sort(

        (a,b)=>

        b.score-a.score

    );



    let result=[];



    while(boxes.length){


        let best =
        boxes.shift();



        result.push(best);



        boxes =
        boxes.filter(

            b=>

            iou(best,b)

            <
            threshold

        );


    }


    return result;

}





function iou(a,b){


    let ax1=a.x-a.w/2;

    let ay1=a.y-a.h/2;

    let ax2=a.x+a.w/2;

    let ay2=a.y+a.h/2;



    let bx1=b.x-b.w/2;

    let by1=b.y-b.h/2;

    let bx2=b.x+b.w/2;

    let by2=b.y+b.h/2;



    let iw=Math.max(

        0,

        Math.min(ax2,bx2)
        -
        Math.max(ax1,bx1)

    );



    let ih=Math.max(

        0,

        Math.min(ay2,by2)
        -
        Math.max(ay1,by1)

    );



    let inter=iw*ih;



    return inter /
    (
        a.w*a.h
        +
        b.w*b.h
        -
        inter
    );


}


</script>


</body>

</html>
