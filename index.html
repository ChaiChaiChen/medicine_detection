<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>AI藥品計數</title>


<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>


<style>

body{
    margin:0;
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}


#cameraBox{

    position:relative;
    width:100vw;
    height:75vh;

}


video{

    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    left:0;
    top:0;

}


canvas{

    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;

}


#count{

    font-size:24px;
    margin:10px;

}


button{

    font-size:18px;
    padding:12px 25px;
    margin:10px;

}

</style>

</head>


<body>


<h2>
AI藥品顆數辨識
</h2>


<div id="cameraBox">


<video
id="video"
autoplay
playsinline>
</video>


<canvas
id="canvas">
</canvas>


</div>


<div id="count">
藥品數量:0
</div>


<button onclick="startCamera()">
開啟相機
</button>


<button onclick="stopCamera()">
關閉相機
</button>



<script>


ort.env.wasm.wasmPaths =
"https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";



let session=null;

let stream=null;

let running=false;



const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");




// =======================
// 載入模型
// =======================


async function loadModel(){


    session =
    await ort.InferenceSession.create(
        "model.onnx",
        {
            executionProviders:[
                "wasm"
            ]
        }
    );


    console.log(
        "ONNX載入完成"
    );

}






// =======================
// 開啟相機
// =======================


async function startCamera(){


    if(!session)
        await loadModel();



    stream =
    await navigator.mediaDevices
    .getUserMedia({

        video:{
            facingMode:
            "environment"
        },

        audio:false

    });



    video.srcObject=stream;


    video.onloadedmetadata=()=>{


        canvas.width =
        video.videoWidth;


        canvas.height =
        video.videoHeight;


        running=true;


        detectLoop();

    };


}






// =======================
// 關閉
// =======================


function stopCamera(){


    running=false;


    if(stream){

        stream
        .getTracks()
        .forEach(
            t=>t.stop()
        );

    }

}






// =======================
// AI LOOP
// =======================


async function detectLoop(){


    if(!running)
        return;



    let tensor =
    preprocess();



    let inputName =
    session.inputNames[0];



    let output =
    await session.run({

        [inputName]:
        tensor

    });



    drawDetection(
        output["output0"]
    );



    requestAnimationFrame(
        detectLoop
    );

}







// =======================
// 前處理
// =======================


function preprocess(){


    const size=640;


    let c =
    document.createElement("canvas");


    c.width=size;
    c.height=size;


    let cctx =
    c.getContext("2d");



    cctx.drawImage(

        video,

        0,

        0,

        size,

        size

    );



    let img =
    cctx.getImageData(
        0,
        0,
        size,
        size
    );



    let data =
    img.data;



    let input =
    new Float32Array(
        size*size*3
    );



    for(
        let i=0;
        i<size*size;
        i++
    ){

        input[i]
        =
        data[i*4]/255;


        input[i+size*size]
        =
        data[i*4+1]/255;


        input[i+size*size*2]
        =
        data[i*4+2]/255;

    }



    return new ort.Tensor(

        "float32",

        input,

        [
            1,
            3,
            size,
            size
        ]

    );


}









// =======================
// YOLO解析
// =======================


function drawDetection(output){


    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );



    let data =
    output.data;



    let count=0;



    let boxes=[];



    /*
    
    YOLO輸出:

    [1,5,8400]

    前8400 x
    第二8400 y
    第三8400 w
    第四8400 h
    第五8400 score

    */



    const total=8400;



    for(
        let i=0;
        i<total;
        i++
    ){


        let score =
        data[i+total*4];



        if(score<0.5)
            continue;



        let x =
        data[i];


        let y =
        data[i+total];


        let w =
        data[i+total*2];


        let h =
        data[i+total*3];



        boxes.push({

            x:x,
            y:y,
            w:w,
            h:h,
            score:score

        });


    }



    // 簡易NMS
    boxes =
    boxes.slice(0,100);



    boxes.forEach(b=>{


        count++;



        let scaleX =
        canvas.width/640;


        let scaleY =
        canvas.height/640;



        let x =
        b.x*scaleX;


        let y =
        b.y*scaleY;


        let w =
        b.w*scaleX;


        let h =
        b.h*scaleY;



        ctx.strokeStyle="red";

        ctx.lineWidth=3;



        ctx.strokeRect(

            x-w/2,

            y-h/2,

            w,

            h

        );



        ctx.fillStyle="yellow";

        ctx.font="18px Arial";


        ctx.fillText(

            Math.round(
                b.score*100
            )
            +"%",

            x-w/2,

            y-h/2-5

        );


    });



    document.getElementById("count")
    .innerHTML =
    "藥品數量:"
    +
    count
    +
    " 顆";

}



</script>


</body>

</html>
