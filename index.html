<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
iPhone ONNX AI Point Detection
</title>


<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js">
</script>


<style>


body{

    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:sans-serif;

}



h2{

    margin:10px;

}



#cameraBox{

    position:relative;

    width:100vw;

    height:75vh;

}



video{

    position:absolute;

    left:0;

    top:0;

    width:100%;

    height:100%;

    object-fit:cover;

}



canvas{

    position:absolute;

    left:0;

    top:0;

    width:100%;

    height:100%;

}



button{

    margin:10px;

    padding:15px 25px;

    font-size:18px;

}



</style>


</head>



<body>


<h2>
iPhone ONNX AI Camera
</h2>



<div id="cameraBox">


<video
id="video"
autoplay
playsinline>
</video>


<canvas
id="canvas">
</canvas>


</div>



<button onclick="startCamera()">
開啟相機
</button>


<button onclick="stopCamera()">
關閉相機
</button>



<script>


// =====================
// ONNX設定
// =====================


ort.env.wasm.wasmPaths =
"https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";



let session=null;

let stream=null;

let running=false;



const video =
document.getElementById(
"video"
);



const canvas =
document.getElementById(
"canvas"
);



const ctx =
canvas.getContext(
"2d"
);





// =====================
// 載入模型
// =====================


async function loadModel(){


    try{


        session =
        await ort.InferenceSession.create(
            "model.onnx",
            {

                executionProviders:[
                    "wasm"
                ]

            }
        );


        console.log(
        "ONNX模型載入成功"
        );


    }

    catch(e){


        alert(
        "模型載入失敗:\n"
        +
        e.message
        );


    }


}





// =====================
// 開啟相機
// =====================


async function startCamera(){



    if(!session){

        await loadModel();

    }



    try{


        stream =
        await navigator.mediaDevices
        .getUserMedia({

            video:{

                facingMode:
                {
                    ideal:
                    "environment"
                }

            },

            audio:false


        });



        video.srcObject =
        stream;



        running=true;



        detectLoop();



    }


    catch(e){


        alert(
        "相機開啟失敗:"
        +
        e.message
        );


    }


}







// =====================
// 關閉相機
// =====================


function stopCamera(){



    running=false;



    if(stream){


        stream
        .getTracks()
        .forEach(
            t=>t.stop()
        );


    }


}







// =====================
// AI循環
// =====================


async function detectLoop(){



    if(!running)
        return;



    if(video.readyState===4){



        let input =
        preprocess();



        try{


            let feeds={};



            let name =
            session.inputNames[0];



            feeds[name]=input;



            let output =
            await session.run(
                feeds
            );



            drawPoints(output);



        }


        catch(e){


            console.log(e);


        }



    }



    requestAnimationFrame(
        detectLoop
    );



}








// =====================
// 影像轉Tensor
// =====================


function preprocess(){



    const size=640;



    let tempCanvas =
    document.createElement(
        "canvas"
    );


    tempCanvas.width=size;

    tempCanvas.height=size;



    let temp =
    tempCanvas.getContext(
        "2d"
    );



    temp.drawImage(

        video,

        0,

        0,

        size,

        size

    );



    let image =
    temp.getImageData(

        0,

        0,

        size,

        size

    );



    let pixels =
    image.data;



    let input =
    new Float32Array(

        size*
        size*
        3

    );




    for(
        let i=0;
        i<size*size;
        i++
    ){



        input[i]
        =
        pixels[i*4]
        /
        255;



        input[i+size*size]
        =
        pixels[i*4+1]
        /
        255;



        input[i+size*size*2]
        =
        pixels[i*4+2]
        /
        255;



    }





    return new ort.Tensor(

        "float32",

        input,

        [

            1,

            3,

            size,

            size

        ]

    );


}









// =====================
// 畫AI點
// =====================


function drawPoints(output){



    canvas.width =
    video.videoWidth;



    canvas.height =
    video.videoHeight;



    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );



    let key =
    Object.keys(output)[0];



    let data =
    output[key].data;



    console.log(data);





    // 假設輸出:
    //
    // x1,y1,x2,y2...
    //
    // 0~1比例座標



    for(
        let i=0;
        i<data.length;
        i+=2
    ){



        let x =
        data[i]
        *
        canvas.width;



        let y =
        data[i+1]
        *
        canvas.height;



        drawDot(
            x,
            y
        );


    }



}







function drawDot(x,y){



    ctx.beginPath();



    ctx.arc(

        x,

        y,

        8,

        0,

        Math.PI*2

    );



    ctx.fillStyle =
    "red";



    ctx.fill();



}



</script>


</body>

</html>
